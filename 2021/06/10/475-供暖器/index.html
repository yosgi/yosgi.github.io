        <p>首先想到的就是找到所有距离房屋最短距离的heater的距离 r ，然后返回最大的 r</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> findRadius = <span class="function"><span class="keyword">function</span>(<span class="params">houses, heaters</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> max = <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; houses.length ; i ++) &#123;</span><br><span class="line">        <span class="keyword">var</span> house_position = houses[i]</span><br><span class="line">        <span class="keyword">var</span> r = <span class="literal">Infinity</span></span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">let</span> j = <span class="number">0</span> ; j &lt; heaters.length ; j ++) &#123;</span><br><span class="line">            <span class="keyword">var</span> heat_position = heaters[j]</span><br><span class="line">            <span class="keyword">var</span> reduce = <span class="built_in">Math</span>.abs(house_position - heat_position)</span><br><span class="line">            r = <span class="built_in">Math</span>.min(r,reduce)</span><br><span class="line">        &#125;</span><br><span class="line">        max = <span class="built_in">Math</span>.max(r,max)</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> max</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>

<p>既然这样，那么也可以利用二分法找到heater</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> findRadius = <span class="function"><span class="keyword">function</span>(<span class="params">houses, heaters</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> r = <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; houses.length ; i ++) &#123;</span><br><span class="line">        <span class="keyword">var</span> house_position = houses[i]</span><br><span class="line">        <span class="keyword">let</span> left = <span class="number">0</span> , right = heaters.length - <span class="number">1</span></span><br><span class="line">        <span class="comment">//  查找离 house_position 最近的 heat_position</span></span><br><span class="line">        <span class="comment">//  也就是查找 house_position 的最右插入点</span></span><br><span class="line">        <span class="keyword">while</span>(left &lt;= right &amp;&amp; right &lt; heaters.length) &#123;</span><br><span class="line">            <span class="keyword">let</span> mid = left + <span class="built_in">Math</span>.floor((right - left) / <span class="number">2</span>)</span><br><span class="line">            <span class="keyword">var</span> heat_position = heaters[mid]</span><br><span class="line">            <span class="comment">// 找到的不大于，再往右边找</span></span><br><span class="line">            <span class="keyword">if</span>(heat_position &lt;=  house_position) &#123;</span><br><span class="line">                left = mid + <span class="number">1</span></span><br><span class="line">            &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                right = mid - <span class="number">1</span></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">// 这时候找到的插入点不一定是最近的,左边的比他小，所以需要比较一下</span></span><br><span class="line">        <span class="keyword">var</span>  R = <span class="built_in">Math</span>.abs(heaters[right] - house_position)</span><br><span class="line">        <span class="keyword">if</span>(right &gt; <span class="number">0</span>) &#123;</span><br><span class="line">            R = <span class="built_in">Math</span>.min( <span class="built_in">Math</span>.abs( heaters[right - <span class="number">1</span>] - house_position) , R)</span><br><span class="line">        &#125;</span><br><span class="line">        r = <span class="built_in">Math</span>.max(r,R)</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> r</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
