<p>首先能看出来是一个考察DFS的题目</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> swimInWater = <span class="function"><span class="keyword">function</span>(<span class="params">grid</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">let</span> row = grid.length;</span><br><span class="line">  <span class="keyword">let</span> col = grid[<span class="number">0</span>].length; </span><br><span class="line">  <span class="keyword">var</span> step = <span class="number">0</span></span><br><span class="line">  <span class="keyword">while</span>(<span class="literal">true</span>) &#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; row ; i ++) &#123;</span><br><span class="line">      <span class="keyword">for</span>(<span class="keyword">let</span> j = <span class="number">0</span> ; j &lt; col ; j ++)&#123;</span><br><span class="line">        grid[i][j] --</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">var</span> visited = []</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; row ; i ++) &#123;</span><br><span class="line">      <span class="keyword">let</span> arr = []</span><br><span class="line">      <span class="keyword">for</span>(<span class="keyword">let</span> j = <span class="number">0</span> ; j &lt; col ; j ++) &#123;</span><br><span class="line">        arr.push(<span class="literal">false</span>)</span><br><span class="line">      &#125;</span><br><span class="line">      visited.push(arr)</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">var</span> dfs = <span class="function"><span class="keyword">function</span> (<span class="params">i,j</span>) </span>&#123;</span><br><span class="line">        <span class="keyword">if</span> ( i&lt; <span class="number">0</span> || j &lt; <span class="number">0</span> || i &gt;= row || j &gt;= col) <span class="keyword">return</span> <span class="literal">false</span> </span><br><span class="line">        <span class="keyword">if</span> (visited[i][j]) &#123;</span><br><span class="line">          <span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">          visited[i][j] = <span class="literal">true</span></span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span> (grid[i][j] &gt; <span class="number">0</span>) <span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">        <span class="keyword">if</span> (i === row - <span class="number">1</span> &amp;&amp; j === col - <span class="number">1</span> &amp;&amp; grid[i][j] &lt;= <span class="number">0</span>) <span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">        <span class="keyword">return</span> dfs(i+<span class="number">1</span>,j) || dfs(i-<span class="number">1</span>,j) || dfs(i,j-<span class="number">1</span>)|| dfs(i,j + <span class="number">1</span>)</span><br><span class="line">    &#125;</span><br><span class="line">    step++</span><br><span class="line">    <span class="keyword">if</span> (dfs(<span class="number">0</span>,<span class="number">0</span>) === <span class="literal">true</span>) <span class="keyword">break</span>  </span><br><span class="line">    </span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> step</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>

<p>想到我们不必从 1 开始尝试，可以用二分法找到最左插入点</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> swimInWater = <span class="function"><span class="keyword">function</span>(<span class="params">grid</span>) </span>&#123;</span><br><span class="line">  <span class="keyword">let</span> row = grid.length;</span><br><span class="line">  <span class="keyword">let</span> col = grid[<span class="number">0</span>].length; </span><br><span class="line">  <span class="keyword">let</span> right = -<span class="literal">Infinity</span></span><br><span class="line">  <span class="keyword">let</span> left = <span class="literal">Infinity</span></span><br><span class="line">  <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; row ; i ++) &#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> j = <span class="number">0</span> ; j &lt; col ; j ++ )&#123;</span><br><span class="line">      <span class="keyword">let</span> num = grid[i][j]</span><br><span class="line">      right = <span class="built_in">Math</span>.max(right,num)</span><br><span class="line">      left = <span class="built_in">Math</span>.min(left,num)</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">let</span> mid = left + <span class="built_in">Math</span>.floor( (right - left) / <span class="number">2</span> )</span><br><span class="line">  <span class="keyword">while</span>(left &lt;= right) &#123;</span><br><span class="line">    mid = left + <span class="built_in">Math</span>.floor( (right - left) / <span class="number">2</span> )</span><br><span class="line">    <span class="keyword">var</span> visited = []</span><br><span class="line">    <span class="keyword">var</span> new_grid = []</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; row ; i ++) &#123;</span><br><span class="line">      <span class="keyword">let</span> arr = []</span><br><span class="line">      <span class="keyword">let</span> _grid = []</span><br><span class="line">      <span class="keyword">for</span>(<span class="keyword">let</span> j = <span class="number">0</span> ; j &lt; col ; j ++) &#123;</span><br><span class="line">        arr.push(<span class="literal">false</span>)</span><br><span class="line">        _grid.push(grid[i][j] - mid)</span><br><span class="line">      &#125;</span><br><span class="line">      visited.push(arr)</span><br><span class="line">      new_grid.push(_grid)</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">var</span> dfs = <span class="function"><span class="keyword">function</span> (<span class="params">i,j</span>) </span>&#123;</span><br><span class="line">      <span class="keyword">if</span> ( i &lt; <span class="number">0</span> || j &lt; <span class="number">0</span> || i &gt;= row || j &gt;= col) <span class="keyword">return</span> <span class="literal">false</span> </span><br><span class="line">      <span class="keyword">if</span> (visited[i][j]) &#123;</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">      &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">        visited[i][j] = <span class="literal">true</span></span><br><span class="line">      &#125;</span><br><span class="line">      <span class="keyword">if</span> (new_grid[i][j] &gt; <span class="number">0</span>) <span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">      <span class="keyword">if</span> (i === row - <span class="number">1</span> &amp;&amp; j === col - <span class="number">1</span> &amp;&amp; new_grid[i][j] &lt;= <span class="number">0</span>) <span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">      <span class="keyword">return</span> dfs(i+<span class="number">1</span>,j) || dfs(i-<span class="number">1</span>,j) || dfs(i,j-<span class="number">1</span>)|| dfs(i,j + <span class="number">1</span>)</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span>(dfs(<span class="number">0</span>,<span class="number">0</span>)) &#123;</span><br><span class="line">      <span class="comment">// 找到了备胎，继续看能不能更小 </span></span><br><span class="line">      right = mid - <span class="number">1</span></span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      left =  mid + <span class="number">1</span></span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> left</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
