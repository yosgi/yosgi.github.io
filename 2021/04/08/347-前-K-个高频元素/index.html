">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Heap</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="title">constructor</span>(<span class="params">list, compare = (a, b) =&gt; a - b</span>)</span> &#123;</span><br><span class="line">      <span class="built_in">this</span>.left = <span class="function"><span class="params">index</span> =&gt;</span> <span class="number">2</span> * index + <span class="number">1</span></span><br><span class="line">      <span class="built_in">this</span>.right = <span class="function"><span class="params">index</span> =&gt;</span> <span class="number">2</span> * index + <span class="number">2</span></span><br><span class="line">      <span class="built_in">this</span>.parent = <span class="function"><span class="params">index</span> =&gt;</span> <span class="built_in">Math</span>.floor((index - <span class="number">1</span>) / <span class="number">2</span>)</span><br><span class="line">      <span class="built_in">this</span>.heapify = <span class="function">(<span class="params">index = <span class="number">0</span></span>) =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">const</span> &#123; list &#125; = <span class="built_in">this</span></span><br><span class="line">        <span class="keyword">const</span> leftIndex = <span class="built_in">this</span>.left(index)</span><br><span class="line">        <span class="keyword">const</span> rightIndex = <span class="built_in">this</span>.right(index)</span><br><span class="line">        <span class="keyword">let</span> maxIndex = index</span><br><span class="line">        <span class="keyword">if</span> (list[leftIndex] !== <span class="literal">undefined</span></span><br><span class="line">          &amp;&amp; <span class="built_in">this</span>.compare(list[maxIndex], list[leftIndex]) &gt; <span class="number">0</span>) &#123;</span><br><span class="line">          maxIndex = leftIndex</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span> (list[rightIndex] !== <span class="literal">undefined</span></span><br><span class="line">          &amp;&amp; <span class="built_in">this</span>.compare(list[maxIndex], list[rightIndex]) &gt; <span class="number">0</span>) &#123;</span><br><span class="line">          maxIndex = rightIndex</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span> (index !== maxIndex) &#123;</span><br><span class="line">          <span class="keyword">const</span> temp = list[index]</span><br><span class="line">          list[index] = list[maxIndex]</span><br><span class="line">          list[maxIndex] = temp</span><br><span class="line">          <span class="built_in">this</span>.heapify(maxIndex)</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">this</span>.buildHeap = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="built_in">Math</span>.floor(<span class="built_in">this</span>.list.length / <span class="number">2</span>); i &gt;= <span class="number">0</span>; i--) &#123;</span><br><span class="line">          <span class="built_in">this</span>.heapify(i)</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> <span class="built_in">this</span>.list</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">this</span>.extract = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">const</span> temp = <span class="built_in">this</span>.list[<span class="number">0</span>]</span><br><span class="line">        <span class="built_in">this</span>.list[<span class="number">0</span>] = <span class="built_in">this</span>.list[<span class="built_in">this</span>.list.length - <span class="number">1</span>]</span><br><span class="line">        <span class="built_in">this</span>.list[<span class="built_in">this</span>.list.length - <span class="number">1</span>] = temp</span><br><span class="line">        <span class="keyword">const</span> result = <span class="built_in">this</span>.list.pop()</span><br><span class="line">        <span class="built_in">this</span>.heapify(<span class="number">0</span>)</span><br><span class="line">        <span class="keyword">return</span> result</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">this</span>.top = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">          <span class="keyword">return</span> <span class="built_in">this</span>.list[<span class="number">0</span>]</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">this</span>.insert = <span class="function">(<span class="params">item</span>) =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">const</span> &#123; list &#125; = <span class="built_in">this</span></span><br><span class="line">        list.push(item)</span><br><span class="line">        <span class="keyword">let</span> index = list.length - <span class="number">1</span></span><br><span class="line">        <span class="keyword">let</span> parentIndex = <span class="built_in">this</span>.parent(index)</span><br><span class="line">        <span class="keyword">while</span> (list[parentIndex] !== <span class="literal">undefined</span> &amp;&amp; <span class="built_in">this</span>.compare(list[parentIndex], list[index]) &gt; <span class="number">0</span>) &#123;</span><br><span class="line">          <span class="keyword">const</span> temp = list[index]</span><br><span class="line">          list[index] = list[parentIndex]</span><br><span class="line">          list[parentIndex] = temp</span><br><span class="line">          index = parentIndex</span><br><span class="line">          parentIndex = <span class="built_in">this</span>.parent(index)</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">this</span>.list = list</span><br><span class="line">      <span class="built_in">this</span>.compare = compare</span><br><span class="line">      <span class="built_in">this</span>.buildHeap()</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> topKFrequent = <span class="function"><span class="keyword">function</span>(<span class="params">nums, k</span>) </span>&#123;</span><br><span class="line">    <span class="keyword">var</span> map = &#123;&#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">let</span> i = <span class="number">0</span> ; i &lt; nums.length ; i ++) &#123;</span><br><span class="line">        <span class="keyword">var</span> num = nums[i]</span><br><span class="line">        <span class="keyword">if</span> (map[num] == <span class="literal">undefined</span>) &#123;</span><br><span class="line">            map[num] = <span class="number">1</span></span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            map[num] ++</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 使用最小堆 ，维护 K 个最高的元素</span></span><br><span class="line">    <span class="keyword">var</span> heap = <span class="keyword">new</span> Heap([],<span class="function">(<span class="params">a,b</span>) =&gt;</span> a[<span class="number">1</span>] - b[<span class="number">1</span>])</span><br><span class="line">    <span class="keyword">var</span> K = <span class="number">0</span> </span><br><span class="line">    <span class="comment">// 因为api是最大堆，所以要取相反数</span></span><br><span class="line">    <span class="built_in">Object</span>.entries(map).forEach(<span class="function">(<span class="params">[key,val]</span>) =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">if</span> (K &lt; k) &#123;</span><br><span class="line">            heap.insert([key,-val]) </span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            <span class="keyword">var</span> top = heap.top()</span><br><span class="line">            <span class="keyword">if</span> (val &gt; - top[<span class="number">1</span>]) &#123;</span><br><span class="line">                heap.extract()</span><br><span class="line">                heap.insert([key,-val]) </span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;)</span><br><span class="line">    <span class="keyword">return</span> heap.list.map(<span class="function">(<span class="params">v</span>) =&gt;</span> v[<span class="number">0</span>]).slice(<span class="number">0</span>,k)</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
